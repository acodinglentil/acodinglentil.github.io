<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Stremio Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-5xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-4xl font-bold mb-2">My Stremio Hub</h1>
      <p class="text-zinc-400">Personal Addon & Debrid Status Dashboard</p>
      <button onclick="checkAll()" class="mt-6 px-8 py-3 bg-sky-600 hover:bg-sky-500 rounded-xl font-medium flex items-center gap-3 mx-auto transition">
        <i class="fas fa-sync"></i> Refresh All Status
      </button>
    </header>

    <!-- Debrid Section -->
    <section class="mb-12">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2"><i class="fas fa-shield-alt"></i> Debrid Services</h2>
      <div class="grid md:grid-cols-2 gap-4" id="debrid"></div>
    </section>

    <!-- Addons -->
    <section>
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2"><i class="fas fa-plug"></i> My Addons</h2>
      <div class="grid gap-4" id="addons"></div>
    </section>

    <div class="text-center text-xs text-zinc-500 mt-16">
      Last checked: <span id="last">Just now</span>
    </div>
  </div>

  <script>
    const debrid = [
      {name: "Real-Debrid", url: "https://real-debrid.com", check: "https://real-debrid.com"},
      {name: "Torbox", url: "https://torbox.app", check: "https://api.torbox.app"}
    ];

    const addons = [
      {name: "AIOStreams (Elfhosted)", check: "https://aiostreams.elfhosted.com"},
      {name: "AIOStreams (Midnight)", check: "https://aiostreams.midnight.com"},
      {name: "AIOStreams (Yeb)", check: "https://aiostreams.yeb"},
      {name: "AIOStreams (Omni)", check: "https://aiostreams.omni"},
      {name: "AIOMetadata", check: "https://aiometadata"},
      {name: "Torrentio", check: "https://torrentio.strem.fun"},
      {name: "Comet", check: "https://comet.elfhosted.com"},
      {name: "MediaFusion", check: "https://mediafusion.elfhosted.com"},
      {name: "Meteor", check: "https://meteor"},
      {name: "Knaben", check: "https://knaben"},
      {name: "Peerflix", check: "https://peerflix"}
    ];

    async function checkStatus(item, container) {
      const card = document.createElement('div');
      card.className = `bg-zinc-900 p-5 rounded-2xl flex justify-between items-center`;
      card.innerHTML = `
        <div>
          <div class="font-medium">${item.name}</div>
          <a href="${item.url || item.check}" target="_blank" class="text-xs text-sky-400 hover:underline">${item.check}</a>
        </div>
        <div class="text-right">
          <span class="status-dot inline-block w-3 h-3 bg-yellow-400 rounded-full"></span>
          <span class="ml-2 text-yellow-400 text-sm font-medium">Checking...</span>
        </div>
      `;
      container.appendChild(card);

      try {
        const res = await fetch(item.check, {method: 'HEAD', mode: 'no-cors', cache: 'no-cache'});
        const statusEl = card.querySelector('span:last-child');
        const dot = card.querySelector('.status-dot');
        statusEl.textContent = 'Up';
        statusEl.className = 'ml-2 text-emerald-400 text-sm font-medium';
        dot.className = 'inline-block w-3 h-3 bg-emerald-400 rounded-full';
      } catch (e) {
        const statusEl = card.querySelector('span:last-child');
        const dot = card.querySelector('.status-dot');
        statusEl.textContent = 'Down / Slow';
        statusEl.className = 'ml-2 text-red-400 text-sm font-medium';
        dot.className = 'inline-block w-3 h-3 bg-red-400 rounded-full';
      }
    }

    function render() {
      document.getElementById('debrid').innerHTML = '';
      document.getElementById('addons').innerHTML = '';
      debrid.forEach(item => checkStatus(item, document.getElementById('debrid')));
      addons.forEach(item => checkStatus(item, document.getElementById('addons')));
    }

    function checkAll() {
      document.getElementById('last').textContent = new Date().toLocaleTimeString();
      render();
    }

    window.onload = render;
  </script>
</body>
</html>
