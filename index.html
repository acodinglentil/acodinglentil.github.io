<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Stremio Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-5xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-2">My Stremio Hub</h1>
      <p class="text-zinc-400">Personal Addon & Debrid Status Dashboard</p>
      <div class="flex justify-center gap-4 mt-6 flex-wrap">
        <button onclick="checkAllStatuses()" class="px-6 py-3 bg-sky-600 hover:bg-sky-500 rounded-full font-medium flex items-center gap-2">
          <i class="fas fa-sync"></i> Refresh All
        </button>
        <button onclick="showAddForm()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-full font-medium flex items-center gap-2">
          <i class="fas fa-plus"></i> Add Addon
        </button>
        <button onclick="shareConfig()" class="px-6 py-3 bg-violet-600 hover:bg-violet-500 rounded-full font-medium flex items-center gap-2">
          <i class="fas fa-share"></i> Share Config
        </button>
      </div>
    </header>

    <!-- Debrid Services -->
    <section class="mb-12">
      <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-shield-alt text-emerald-400"></i> Debrid Services
      </h2>
      <div class="grid md:grid-cols-2 gap-6" id="debrid-cards"></div>
    </section>

    <!-- My Addons -->
    <section>
      <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-plug text-sky-400"></i> My Addons
      </h2>
      <div id="addons-container" class="grid gap-6"></div>
    </section>

    <!-- Add/Edit Modal -->
    <div id="addon-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
      <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
        <h3 class="text-2xl font-bold mb-6" id="modal-title">Add New Addon</h3>
        <input id="addon-name" type="text" placeholder="Addon Name (e.g. Torrentio)" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 mb-4 text-white focus:outline-none focus:border-sky-500">
        <input id="addon-url" type="text" placeholder="https://example.com/manifest.json" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 mb-6 text-white focus:outline-none focus:border-sky-500">
        <div class="flex gap-4">
          <button onclick="saveAddon()" class="flex-1 py-3.5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-medium">Save Changes</button>
          <button onclick="closeModal()" class="flex-1 py-3.5 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-medium">Cancel</button>
        </div>
      </div>
    </div>

    <footer class="text-center text-zinc-500 mt-16 text-sm">
      Last checked: <span id="last-checked">Never</span>
    </footer>
  </div>

  <script>
    let addons = [];
    let editingIndex = -1;

    const debridServices = [
      { name: "Real-Debrid", checkUrl: "https://real-debrid.com", statusUrl: "https://real-debrid.com" },
      { name: "Torbox", checkUrl: "https://torbox.app", statusUrl: "https://status.torbox.app" }
    ];

    const defaultAddons = [
      { name: "AIOStreams Elfhosted", checkUrl: "https://aio.elfhosted.com/manifest.json" },
      { name: "AIOStreams Midnight", checkUrl: "https://aio.midnight.com/manifest.json" },
      { name: "AIOStreams Yeb", checkUrl: "https://aio.yeb.co/manifest.json" },
      { name: "AIOStreams Omni", checkUrl: "https://aio.omni.com/manifest.json" },
      { name: "AIOMetadata", checkUrl: "https://metadata.elfhosted.com/manifest.json" },
      { name: "Torrentio", checkUrl: "https://torrentio.strem.fun/manifest.json" },
      { name: "Comet", checkUrl: "https://comet.elfhosted.com/manifest.json" },
      { name: "MediaFusion", checkUrl: "https://mediafusion.elfhosted.com/manifest.json" },
      { name: "Meteor", checkUrl: "https://meteor.elfhosted.com/manifest.json" },
      { name: "Knaben", checkUrl: "https://knaben.org/manifest.json" }
    ];

    function loadAddons() {
      const saved = localStorage.getItem('stremioAddons');
      if (saved) {
        addons = JSON.parse(saved);
      } else {
        addons = [...defaultAddons];
        saveToLocalStorage();
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('stremioAddons', JSON.stringify(addons));
    }

    function renderDebrid() {
      const container = document.getElementById('debrid-cards');
      container.innerHTML = debridServices.map((service, i) => `
        <div class="bg-zinc-900 rounded-2xl p-6">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-lg">${service.name}</h3>
              <a href="${service.statusUrl}" target="_blank" class="text-xs text-zinc-400 hover:text-white">Official Status →</a>
            </div>
            <div class="text-right">
              <span id="dot-d${i}" class="status-dot bg-yellow-400"></span>
              <span id="status-d${i}" class="ml-2 text-yellow-400 font-medium">Checking...</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderAddons() {
      const container = document.getElementById('addons-container');
      container.innerHTML = addons.map((addon, index) => `
        <div class="bg-zinc-900 rounded-2xl p-6 group">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <h3 class="font-semibold text-lg">${addon.name}</h3>
              <p class="text-xs text-zinc-500 break-all mt-1">${addon.checkUrl}</p>
            </div>
            <div class="flex gap-4 ml-4">
              <button onclick="editAddon(${index})" class="text-sky-400 hover:text-white transition">
                <i class="fas fa-edit"></i>
              </button>
              <button onclick="deleteAddon(${index})" class="text-red-400 hover:text-white transition">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
          <div class="mt-4 flex items-center">
            <span id="dot-${index}" class="status-dot bg-yellow-400"></span>
            <span id="status-${index}" class="ml-2 text-yellow-400 font-medium">Checking...</span>
          </div>
        </div>
      `).join('');
    }

    async function checkStatus(checkUrl, dotId, statusId) {
      const dot = document.getElementById(dotId);
      const statusEl = document.getElementById(statusId);
      if (!dot || !statusEl) return;

      dot.className = 'status-dot bg-yellow-400';
      statusEl.className = 'ml-2 text-yellow-400 font-medium';
      statusEl.textContent = 'Checking...';

      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 8000);

        await fetch(checkUrl, { 
          method: 'HEAD', 
          mode: 'no-cors', 
          signal: controller.signal 
        });
        
        dot.className = 'status-dot bg-emerald-400';
        statusEl.className = 'ml-2 text-emerald-400 font-medium';
        statusEl.textContent = '✅ Up';
      } catch (e) {
        dot.className = 'status-dot bg-red-400';
        statusEl.className = 'ml-2 text-red-400 font-medium';
        statusEl.textContent = '❌ Down / Slow';
      }
    }

    function checkAllStatuses() {
      document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();

      debridServices.forEach((s, i) => checkStatus(s.checkUrl, `dot-d${i}`, `status-d${i}`));
      addons.forEach((a, i) => checkStatus(a.checkUrl, `dot-${i}`, `status-${i}`));
    }

    function showAddForm() {
      editingIndex = -1;
      document.getElementById('modal-title').textContent = 'Add New Addon';
      document.getElementById('addon-name').value = '';
      document.getElementById('addon-url').value = '';
      document.getElementById('addon-modal').classList.remove('hidden');
    }

    function editAddon(index) {
      editingIndex = index;
      const addon = addons[index];
      document.getElementById('modal-title').textContent = 'Edit Addon';
      document.getElementById('addon-name').value = addon.name;
      document.getElementById('addon-url').value = addon.checkUrl;
      document.getElementById('addon-modal').classList.remove('hidden');
    }

    function saveAddon() {
      const name = document.getElementById('addon-name').value.trim();
      const url = document.getElementById('addon-url').value.trim();

      if (!name || !url) {
        alert("Both name and URL are required");
        return;
      }

      if (editingIndex >= 0) {
        addons[editingIndex] = { name, checkUrl: url };
      } else {
        addons.push({ name, checkUrl: url });
      }

      saveToLocalStorage();
      closeModal();
      renderAddons();
      setTimeout(checkAllStatuses, 300);
    }

    function deleteAddon(index) {
      if (confirm('Delete this addon?')) {
        addons.splice(index, 1);
        saveToLocalStorage();
        renderAddons();
      }
    }

    function closeModal() {
      document.getElementById('addon-modal').classList.add('hidden');
    }

    function shareConfig() {
      const configStr = JSON.stringify(addons);
      const encoded = btoa(configStr);
      const shareUrl = `${window.location.origin}${window.location.pathname}?config=${encoded}`;
      
      navigator.clipboard.writeText(shareUrl).then(() => {
        alert('✅ Link copied! Bookmark this URL to restore your exact setup later (even after cache clear).');
      });
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const config = params.get('config');
      if (config) {
        try {
          addons = JSON.parse(atob(config));
          saveToLocalStorage();
          window.history.replaceState({}, document.title, window.location.pathname);
        } catch(e) {
          console.error('Failed to load config');
        }
      }
    }

    window.onload = () => {
      loadFromUrl();
      loadAddons();
      renderDebrid();
      renderAddons();
      checkAllStatuses();
    };
  </script>
</body>
</html>
