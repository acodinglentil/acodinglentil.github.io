<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Stremio Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .url-text { font-size: 0.75rem; color: #64748b; word-break: break-all; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-5xl mx-auto p-6">
    <header class="text-center mb-12">
      <h1 class="text-5xl font-bold mb-2 text-sky-400">My Stremio Hub</h1>
      <p class="text-zinc-400">Personal Addon & Debrid Status Dashboard</p>
      <div class="flex gap-4 justify-center mt-8">
        <button onclick="checkAllStatuses()" class="px-8 py-3 bg-sky-600 hover:bg-sky-500 rounded-xl font-medium flex items-center gap-2">
          <i class="fas fa-sync"></i> Refresh All
        </button>
        <button onclick="showAddForm()" class="px-8 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-xl font-medium flex items-center gap-2">
          <i class="fas fa-plus"></i> Add New
        </button>
      </div>
    </header>

    <!-- Debrid -->
    <section class="mb-12">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fas fa-shield-alt"></i> Debrid Services</h2>
      <div class="grid md:grid-cols-2 gap-6" id="debrid-container"></div>
    </section>

    <!-- Addons -->
    <section>
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fas fa-plug"></i> My Addons</h2>
      <div class="grid gap-6" id="addons-container"></div>
    </section>

    <footer class="text-center mt-16 text-zinc-500 text-sm">
      Last checked: <span id="last-checked">Never</span>
    </footer>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-2xl p-8 w-full max-w-md">
      <h3 id="modal-title" class="text-2xl font-bold mb-6">Add New Service</h3>
      <input id="name-input" type="text" placeholder="Name (e.g. Torrentio)" class="w-full bg-zinc-800 rounded-xl px-4 py-3 mb-4">
      <input id="url-input" type="text" placeholder="Check URL (manifest or status)" class="w-full bg-zinc-800 rounded-xl px-4 py-3 mb-6">
      <div class="flex gap-4">
        <button onclick="saveItem()" class="flex-1 py-3 bg-emerald-600 rounded-xl">Save</button>
        <button onclick="closeModal()" class="flex-1 py-3 bg-zinc-700 rounded-xl">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let services = {
      debrid: [
        {name: "Real-Debrid", url: "https://real-debrid.com"},
        {name: "Torbox", url: "https://torbox.app"}
      ],
      addons: [
        {name: "AIOStreams Elfhosted", url: "https://aio.elfhosted.com"},
        {name: "AIOStreams Midnight", url: "https://aio.midnight.com"},
        {name: "AIOStreams Yeb", url: "https://aio.yeb.dev"},
        {name: "AIOStreams Omni", url: "https://aio.omni.com"},
        {name: "Torrentio", url: "https://torrentio.strem.fun/manifest.json"},
        {name: "Comet", url: "https://comet.elfhosted.com/manifest.json"},
        {name: "MediaFusion", url: "https://mediafusion.elfhosted.com/manifest.json"}
      ]
    };

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('stremioHub');
      if (saved) services = JSON.parse(saved);
    }

    function saveToLocalStorage() {
      localStorage.setItem('stremioHub', JSON.stringify(services));
    }

    async function checkStatus(item, container) {
      const card = document.getElementById(`card-${item.name.replace(/\s+/g, '')}`);
      if (!card) return;

      const statusEl = card.querySelector('.status-text');
      const dot = card.querySelector('.status-dot');

      try {
        const res = await fetch(item.url, {method: 'HEAD', mode: 'no-cors', signal: AbortSignal.timeout(10000)});
        statusEl.textContent = 'Up';
        statusEl.className = 'status-text text-emerald-400';
        dot.className = 'status-dot bg-emerald-400';
      } catch (e) {
        statusEl.textContent = 'Down / Slow';
        statusEl.className = 'status-text text-red-400';
        dot.className = 'status-dot bg-red-400';
      }
    }

    function createCard(item, isDebrid) {
      const id = `card-${item.name.replace(/\s+/g, '')}`;
      return `
        <div id="${id}" class="bg-zinc-900 rounded-3xl p-6">
          <div class="flex justify-between">
            <div>
              <h3 class="font-semibold text-lg">${item.name}</h3>
              <p class="url-text mt-1">${item.url}</p>
            </div>
            <div class="text-right">
              <span class="status-dot bg-yellow-400"></span>
              <span class="status-text ml-2 text-yellow-400">Checking...</span>
            </div>
          </div>
          <div class="mt-6 flex gap-3">
            <button onclick="editItem('${item.name}', '${isDebrid ? 'debrid' : 'addons'}')" class="text-sky-400 hover:text-sky-300 text-sm flex items-center gap-1">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button onclick="deleteItem('${item.name}', '${isDebrid ? 'debrid' : 'addons'}')" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>
      `;
    }

    function render() {
      document.getElementById('debrid-container').innerHTML = services.debrid.map(item => createCard(item, true)).join('');
      document.getElementById('addons-container').innerHTML = services.addons.map(item => createCard(item, false)).join('');

      services.debrid.forEach(item => checkStatus(item, 'debrid'));
      services.addons.forEach(item => checkStatus(item, 'addons'));
    }

    function checkAllStatuses() {
      document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();
      render();
    }

    // Modal functions
    let currentEdit = null;
    let currentType = null;

    function showAddForm(type = 'addons') {
      currentEdit = null;
      currentType = type;
      document.getElementById('modal-title').textContent = 'Add New ' + (type === 'debrid' ? 'Debrid' : 'Addon');
      document.getElementById('name-input').value = '';
      document.getElementById('url-input').value = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function editItem(name, type) {
      currentType = type;
      const list = type === 'debrid' ? services.debrid : services.addons;
      currentEdit = list.find(item => item.name === name);
      if (currentEdit) {
        document.getElementById('modal-title').textContent = 'Edit Service';
        document.getElementById('name-input').value = currentEdit.name;
        document.getElementById('url-input').value = currentEdit.url;
        document.getElementById('modal').classList.remove('hidden');
      }
    }

    function saveItem() {
      const name = document.getElementById('name-input').value.trim();
      const url = document.getElementById('url-input').value.trim();
      if (!name || !url) return alert('Name and URL are required');

      const list = currentType === 'debrid' ? services.debrid : services.addons;

      if (currentEdit) {
        currentEdit.name = name;
        currentEdit.url = url;
      } else {
        list.push({name, url});
      }

      saveToLocalStorage();
      closeModal();
      render();
    }

    function deleteItem(name, type) {
      if (!confirm('Delete this item?')) return;
      const list = type === 'debrid' ? services.debrid : services.addons;
      services[type === 'debrid' ? 'debrid' : 'addons'] = list.filter(item => item.name !== name);
      saveToLocalStorage();
      render();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Init
    loadFromLocalStorage();
    window.onload = render;
  </script>
</body>
</html>
