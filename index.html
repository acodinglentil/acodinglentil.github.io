<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Stremio Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-4xl mx-auto p-6">
    <header class="text-center mb-12">
      <h1 class="text-5xl font-bold mb-2">My Stremio Hub</h1>
      <p class="text-zinc-400">Personal addon & debrid status dashboard</p>
      <button onclick="checkAllStatuses()" 
              class="mt-6 px-6 py-3 bg-sky-600 hover:bg-sky-500 rounded-full font-medium flex items-center gap-2 mx-auto">
        <i class="fas fa-sync"></i> Refresh All
      </button>
    </header>

    <!-- Debrid Services -->
    <section class="mb-16">
      <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-shield-alt text-emerald-400"></i> Debrid Services
      </h2>
      <div class="grid md:grid-cols-2 gap-6" id="debrid-cards">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- Stremio Addons -->
    <section>
      <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-plug text-sky-400"></i> My Stremio Addons
      </h2>
      <div class="grid gap-6" id="addon-cards">
        <!-- Populated by JS -->
      </div>
    </section>

    <footer class="text-center text-zinc-500 mt-20 text-sm">
      Personal dashboard • Last checked: <span id="last-checked">Never</span>
    </footer>
  </div>

  <script>
    // === CONFIGURE YOUR SERVICES HERE ===
    const debridServices = [
      {
        name: "Real-Debrid",
        url: "https://real-debrid.com",
        statusUrl: "https://real-debrid.com",
        checkUrl: "https://real-debrid.com"
      },
      {
        name: "Torbox",
        url: "https://torbox.app",
        statusUrl: "https://status.torbox.app",
        checkUrl: "https://torbox.app"
      }
    ];

    const myAddons = [
      // Add your addons here
    ];

    async function checkStatus(service) {
      const card = document.getElementById(`card-${service.name.replace(/\s+/g, '')}`);
      if (!card) return;

      const statusEl = card.querySelector('.status-text');
      const dotEl = card.querySelector('.status-dot');

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        await fetch(service.checkUrl || service.url, {
          method: 'HEAD',
          mode: 'no-cors',
          signal: controller.signal
        });
        clearTimeout(timeout);

        statusEl.textContent = "Up";
        statusEl.className = "status-text text-emerald-400 font-medium";
        dotEl.className = "status-dot bg-emerald-400";
      } catch (e) {
        statusEl.textContent = "Down / Slow";
        statusEl.className = "status-text text-red-400 font-medium";
        dotEl.className = "status-dot bg-red-400";
      }
    }

    function createCard(service, isDebrid = false) {
      const id = `card-${service.name.replace(/\s+/g, '')}`;
      const html = `
        <div id="${id}" class="bg-zinc-900 rounded-2xl p-6 hover:bg-zinc-800 transition">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-xl font-semibold">${service.name}</h3>
              ${isDebrid ? `<a href="${service.statusUrl}" target="_blank" class="text-xs text-zinc-400 hover:text-white">Official Status →</a>` : ''}
            </div>
            <div class="text-right">
              <span class="status-dot bg-yellow-400"></span>
              <span class="status-text ml-2 text-yellow-400 font-medium">Checking...</span>
            </div>
          </div>
        </div>
      `;
      return html;
    }

    function renderAll() {
      const debridContainer = document.getElementById('debrid-cards');
      debridContainer.innerHTML = debridServices.map(s => createCard(s, true)).join('');

      const addonContainer = document.getElementById('addon-cards');
      addonContainer.innerHTML = myAddons.length 
        ? myAddons.map(s => createCard(s)).join('')
        : '<p class="text-zinc-400">No addons added yet. Tell me which ones to include!</p>';

      debridServices.forEach(checkStatus);
      myAddons.forEach(checkStatus);
    }

    function checkAllStatuses() {
      document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();
      debridServices.forEach(checkStatus);
      myAddons.forEach(checkStatus);
    }

    window.onload = renderAll;
  </script>
</body>
</html>
